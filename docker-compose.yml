version: '3.8'

services:
  # Go backend
  backend:
    build: ./backend
    container_name: math-backend
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - DB_PATH=/app/data/math_association.db
      - JWT_SECRET=${JWT_SECRET:-math-association-secret-key}
      - REDIS_ADDR=redis:6379
      - UPLOAD_DIR=/app/uploads
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - math-network

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: math-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - math-network

  # Frontend (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: math-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - math-network

  # Nginx reverse proxy (for production)
  nginx:
    image: nginx:alpine
    container_name: math-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - math-network

volumes:
  backend_data:
  backend_uploads:
  redis_data:

networks:
  math-network:
    driver: bridge
