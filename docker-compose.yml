version: '3.8'

services:
  # Go 后端
  backend:
    build: ./backend
    container_name: math-backend
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - DB_PATH=/app/data/math_association.db
      - JWT_SECRET=${JWT_SECRET:-math-association-secret-key-2024}
      - UPLOAD_DIR=/app/uploads
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    restart: unless-stopped
    networks:
      - math-network

  # React 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: math-frontend
    restart: unless-stopped
    networks:
      - math-network

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: math-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - math-network

volumes:
  backend_data:
  backend_uploads:

networks:
  math-network:
    driver: bridge